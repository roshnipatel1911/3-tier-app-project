---
- name: Deploy Flask App to App Servers
  hosts: app_servers
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Python3 and pip
      apt:
        name:
          - python3
          - python3-pip
        state: present

    - name: Install Git
      apt:
        name: git
        state: present

    - name: Create /opt/flask-app directory
      file:
        path: /opt/flask-app
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Clone Flask app from GitHub
      git:
        repo: https://github.com/roshnipatel1911/flash-app.git
        dest: /opt/flask-app
        version: main
      become_user: ubuntu

    - name: Install Python dependencies
      pip:
        requirements: /opt/flask-app/requirements.txt
        executable: pip3
        extra_args: --break-system-packages

    - name: Kill any process on port 8080
      shell: lsof -ti:8080 | xargs kill -9 2>/dev/null || true

    - name: Start Flask app
      shell: cd /opt/flask-app && nohup python3 app.py > /tmp/flask.log 2>&1 &
      become_user: ubuntu
